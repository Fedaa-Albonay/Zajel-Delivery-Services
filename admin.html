<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ZAJEL | Admin Dashboard</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="dashboard-page">
        <aside class="sidebar admin">
            <a class="brand" href="index.html"><span>ZAJEL</span><i></i></a
            ><a class="active"><i class="fa-solid fa-chart-line"></i> Overview</a
            ><a><i class="fa-solid fa-truck"></i> Fleet</a><a><i class="fa-solid fa-users"></i> Drivers</a
            ><a><i class="fa-solid fa-map"></i> Live Map</a
            ><a href="index.html"><i class="fa-solid fa-house"></i> Website</a>
        </aside>
        <main class="dashboard-main">
            <header class="dashboard-top">
                <div>
                    <p class="eyebrow">Admin dashboard</p>
                    <h1>Operations overview</h1>
                </div>
                <button class="primary-btn">Create Shipment</button>
            </header>
            <section class="dashboard-cards">
                <article><span>Orders Today</span><strong>186</strong></article>
                <article><span>Active Drivers</span><strong>42</strong></article>
                <article><span>Revenue</span><strong>AED 18.4K</strong></article>
                <article><span>Pending</span><strong>17</strong></article>
            </section>
            <section class="admin-grid">
                <div class="dashboard-panel">
                    <h2>Live Fleet</h2>
                    <img class="panel-img" src="img/uae-map.jpeg" alt="UAE delivery operations map" />
                </div>
                <div class="dashboard-panel">
                    <h2>Driver Performance</h2>
                    <div class="progress-row"><span>On-time delivery</span><b>98%</b><i style="width: 98%"></i></div>
                    <div class="progress-row"><span>Customer rating</span><b>96%</b><i style="width: 96%"></i></div>
                    <div class="progress-row"><span>Fleet availability</span><b>87%</b><i style="width: 87%"></i></div>
                </div>
            </section>
        </main>
    </body>
</html>
