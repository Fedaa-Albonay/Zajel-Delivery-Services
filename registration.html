<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAJEL | Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-visual"><a class="brand" href="index.html"><span>ZAJEL</span><i></i></a><h1>Welcome to your delivery command center.</h1><p>Login, track shipments and manage delivery requests from one professional dashboard.</p></section>
    <section class="auth-card">
      <div class="auth-tabs"><button class="active" data-tab="login">Login</button><button data-tab="register">Sign Up</button></div>
      <form id="loginForm" class="auth-form active"><h2>Login</h2><label>Email<input id="loginEmail" type="email" required /></label><label>Password<input id="loginPassword" type="password" required /></label><button class="primary-btn" type="submit">Login</button><p class="form-note">Demo: create any account or use admin@zajel.ae / password123</p></form>
      <form id="registerForm" class="auth-form"><h2>Create account</h2><label>Full Name<input id="registerName" type="text" required /></label><label>Email<input id="registerEmail" type="email" required /></label><label>Password<input id="registerPassword" type="password" minlength="8" required /></label><button class="primary-btn" type="submit">Create Account</button></form>
      <div id="authMessage" class="auth-message"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
